user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Ocultar versión de nginx
    server_tokens off;

    # ── HTTP ─────────────────────────────────────────────────────────────────
    # Requerido para:
    # 1. Detección inicial de portal cautivo por el SO del cliente
    # 2. Responder a pruebas de conectividad HTTP (Apple CNA, Android NCSI)
    server {
        listen 80;
        server_name _;

        # Apple Captive Network Assistant
        location /hotspot-detect.html {
            return 200 "<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>";
            add_header Content-Type text/html;
        }

        # Android / Chrome connectivity check
        location /generate_204 {
            return 204;
        }

        # Microsoft NCSI
        location /ncsi.txt {
            return 200 "Microsoft NCSI";
            add_header Content-Type text/plain;
        }

        location /connecttest.txt {
            return 200 "Microsoft Connect Test";
            add_header Content-Type text/plain;
        }

        # Servir el portal directamente por HTTP para máxima compatibilidad con dispositivos móviles
        location / {
            proxy_pass         http://portal:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/portal.crt;
        ssl_certificate_key /etc/nginx/ssl/portal.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Headers de seguridad
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;

        # Proxy al portal Node.js
        location / {
            proxy_pass         http://portal:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;

            # Buffer para respuestas del portal
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # Health check interno de nginx
        location /nginx-health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
